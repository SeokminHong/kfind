name: release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: write
  contents: write
  id-token: write

jobs:
  windows-package:
    name: Windows and Chocolatey package
    runs-on: windows-2025
    env:
      RUST_TOOLCHAIN: 1.97.0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install the pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal
          rustup default $env:RUST_TOOLCHAIN

      - name: Validate release metadata
        id: metadata
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $packageVersion = (
            $metadata.packages | Where-Object { $_.name -eq 'kfind-cli' }
          ).version
          if ($version -ne $packageVersion) {
            throw "Tag version $version does not match package version $packageVersion."
          }
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$version"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"

      - name: Build the Windows binary
        shell: pwsh
        run: cargo build --release --locked --package kfind-cli

      - name: Build and verify morphology resources
        shell: bash
        run: |
          scripts/build-full-pos.sh dist/full-pos
          scripts/build-component-resource.sh dist/component
          cargo run --locked --package kfind-testkit --bin verify-gold -- \
            dist/full-pos/lexicon.bin \
            dist/component/morphology-component-compact.kfc

      - name: Build the Windows archive and Chocolatey package
        shell: pwsh
        run: |
          $archive = "dist/chocolatey/kfind-windows-x86_64-$env:VERSION.zip"
          ./scripts/build-windows-distribution.ps1 `
            -Version $env:VERSION `
            -Binary target/release/kfind.exe `
            -FullPosDirectory dist/full-pos `
            -ComponentDirectory dist/component `
            -OutputArchive $archive
          $archiveSha256 = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $packageDirectory = 'dist/chocolatey/package'
          ./scripts/render-chocolatey-package.ps1 `
            -Version $env:VERSION `
            -ArchiveSha256 $archiveSha256 `
            -OutputDirectory $packageDirectory
          choco pack "$packageDirectory/kfind.nuspec" `
            --output-directory dist/chocolatey `
            --limit-output

      - uses: actions/upload-artifact@v7
        with:
          name: chocolatey-release
          path: |
            dist/chocolatey/kfind-windows-x86_64-${{ steps.metadata.outputs.version }}.zip
            dist/chocolatey/kfind.${{ steps.metadata.outputs.version }}.nupkg
          if-no-files-found: error

  release:
    needs: windows-package
    runs-on: ubuntu-24.04
    env:
      RUST_TOOLCHAIN: 1.97.0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: chocolatey-release
          path: dist/chocolatey

      - name: Install the pinned Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy
          rustup default "$RUST_TOOLCHAIN"

      - name: Validate release metadata
        id: metadata
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "kfind-cli") | .version')
          project_license=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "kfind-cli") | .license')
          package_rust_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "kfind-cli") | .rust_version')
          test "$version" = "$package_version"
          test "$project_license" = "MIT"
          [[ "$RUST_TOOLCHAIN" == "$package_rust_version" || "$RUST_TOOLCHAIN" == "$package_rust_version".* ]]
          test -f LICENSE
          test -f LICENSES.md
          test -f data/enriched/predicates.tsv
          test -f data/enriched/NOTICE.md
          grep -Fq "원자료 저작자·제공자는 국립국어원입니다." data/enriched/NOTICE.md
          grep -Fq "CC BY-SA 2.0 KR" data/enriched/NOTICE.md
          {
            printf 'version=%s\n' "$version"
            printf 'license=%s\n' "$project_license"
            printf 'rust_toolchain=%s\n' "$RUST_TOOLCHAIN"
          } >>"$GITHUB_OUTPUT"

      - name: Test the release source
        run: |
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Install npm and wasm-pack
        run: |
          npm install --global npm@11.5.1
          cargo install wasm-pack --version 0.15.0 --locked

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          mkdir -p dist/assets
          scripts/build-full-pos.sh dist/full-pos
          scripts/build-component-resource.sh dist/component
          cargo run --locked --package kfind-testkit --bin verify-gold -- \
            dist/full-pos/lexicon.bin \
            dist/component/morphology-component-compact.kfc
          cargo run --locked --package kfind-cli --features distribution-assets --bin kfind-generate-assets -- dist/assets
          KFIND_COMPONENT_RESOURCE_DIR="$PWD/dist/component" pnpm --dir packages/kfind run test
          pnpm --dir packages/kfind run pack:check
          git archive --format=tar.gz --prefix="kfind-${VERSION}/" --output="dist/kfind-${VERSION}.tar.gz" "$GITHUB_SHA"
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "dist/kfind-full-pos-${VERSION}.tar.gz" -C dist/full-pos .
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "dist/kfind-component-${VERSION}.tar.gz" -C dist/component .
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf "dist/kfind-assets-${VERSION}.tar.gz" -C dist/assets .

      - name: Render the tap formula
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          PROJECT_LICENSE: ${{ steps.metadata.outputs.license }}
          FORMULA_RUST_TOOLCHAIN: ${{ steps.metadata.outputs.rust_toolchain }}
        run: |
          source_sha=$(sha256sum "dist/kfind-${VERSION}.tar.gz" | awk '{print $1}')
          full_pos_sha=$(sha256sum "dist/kfind-full-pos-${VERSION}.tar.gz" | awk '{print $1}')
          component_sha=$(sha256sum "dist/kfind-component-${VERSION}.tar.gz" | awk '{print $1}')
          assets_sha=$(sha256sum "dist/kfind-assets-${VERSION}.tar.gz" | awk '{print $1}')
          scripts/render-homebrew-formula.sh "$VERSION" "$FORMULA_RUST_TOOLCHAIN" "$source_sha" "$full_pos_sha" "$component_sha" "$assets_sha" "$PROJECT_LICENSE" dist/kfind.rb
          grep -Fqx '  license :cannot_represent' dist/kfind.rb

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          release_flags=()
          if [[ "$VERSION" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            "dist/kfind-${VERSION}.tar.gz" \
            "dist/kfind-full-pos-${VERSION}.tar.gz" \
            "dist/kfind-component-${VERSION}.tar.gz" \
            "dist/kfind-assets-${VERSION}.tar.gz" \
            "dist/chocolatey/kfind-windows-x86_64-${VERSION}.zip" \
            "dist/chocolatey/kfind.${VERSION}.nupkg" \
            --verify-tag \
            --generate-notes \
            --title "kfind ${VERSION}" \
            "${release_flags[@]}"

      - name: Publish the npm package
        env:
          KFIND_COMPONENT_RESOURCE_DIR: ${{ github.workspace }}/dist/component
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          npm_tag=latest
          if [[ "$VERSION" == *-* ]]; then
            npm_tag=next
          fi
          npm publish ./packages/kfind --access public --provenance --tag "$npm_tag"

      - name: Open the Homebrew tap pull request
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          gh auth setup-git
          gh repo clone SeokminHong/homebrew-brew dist/tap
          cd dist/tap
          git switch -c "kfind-v${VERSION}"
          install -m 0644 ../kfind.rb Formula/kfind.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kfind.rb
          git commit -m "kfind ${VERSION}"
          git push --set-upstream origin "kfind-v${VERSION}"
          {
            printf '## Summary\n\n- publish kfind %s\n' "$VERSION"
            printf '%s\n\n## Test\n\n' '- install morphology resources and generated CLI assets'
            printf '%s\n' "- \`brew test-bot --only-formulae\`"
          } >../tap-pr.md
          gh pr create \
            --repo SeokminHong/homebrew-brew \
            --base main \
            --head "kfind-v${VERSION}" \
            --title "kfind ${VERSION}" \
            --body-file ../tap-pr.md

      - name: Verify and publish the Chocolatey package
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run publish-chocolatey.yml
          --ref main
          --field tag="$GITHUB_REF_NAME"

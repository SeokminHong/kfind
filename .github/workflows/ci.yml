name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: |
          cargo +stable fmt --all -- --check
          cargo +stable fmt --manifest-path fuzz/Cargo.toml -- --check
          cargo +stable fmt --manifest-path tools/nikl-lexicon/classifier/Cargo.toml -- --check
          cargo +stable fmt --manifest-path tools/morph-compare/runner/Cargo.toml -- --check
          cargo +stable fmt --manifest-path tools/morph-index-benchmark/Cargo.toml -- --check
      - name: Run Clippy
        run: |
          cargo +stable clippy --workspace --all-targets --locked -- -D warnings
          cargo +stable clippy --manifest-path tools/nikl-lexicon/classifier/Cargo.toml \
            --all-targets --locked -- -D warnings
          cargo +stable clippy --manifest-path tools/morph-compare/runner/Cargo.toml \
            --all-targets --locked -- -D warnings
          cargo +stable clippy --manifest-path tools/morph-index-benchmark/Cargo.toml \
            --all-targets --locked -- -D warnings
      - name: Test the NIKL importer
        run: >-
          python3 -m unittest discover
          --start-directory tools/nikl-lexicon/python
          --pattern 'test_*.py'
      - name: Test the real-corpus evaluator
        run: >-
          python3 -m unittest discover
          --start-directory tools/morph-compare/real_corpus
          --pattern 'test_*.py'
      - name: Check fuzz targets
        run: cargo +stable check --manifest-path fuzz/Cargo.toml --bins --locked
      - name: Check Homebrew formula metadata
        run: |
          output=$(mktemp)
          trap 'rm -f "$output"' EXIT
          checksum=$(printf '%064d' 0)
          scripts/render-homebrew-formula.sh \
            0.3.0 1.97.0 "$checksum" "$checksum" "$checksum" "$checksum" MIT "$output"
          grep -Fqx '  license :cannot_represent' "$output"

  test:
    name: Test (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Test benchmark guard
        run: >-
          python3 -m unittest discover
          --start-directory tools/benchmark-guard
          --pattern 'test_*.py'
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Run workspace tests
        run: |
          cargo +stable test --workspace --locked
          cargo +stable test --manifest-path tools/nikl-lexicon/classifier/Cargo.toml --locked
          cargo +stable test --manifest-path tools/morph-compare/runner/Cargo.toml --locked
          cargo +stable test --manifest-path tools/morph-index-benchmark/Cargo.toml --locked

  fuzz:
    name: Fuzz targets
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      KFIND_FUZZ_TOOLCHAIN: nightly-2026-07-11
      KFIND_CARGO_FUZZ_VERSION: 0.13.2
      KFIND_FUZZ_SECONDS: 15
      KFIND_FUZZ_TIMEOUT_SECONDS: 5
      KFIND_FUZZ_RSS_LIMIT_MB: 2048
    steps:
      - uses: actions/checkout@v6
      - name: Install fuzz toolchain
        run: |
          rustup toolchain install "$KFIND_FUZZ_TOOLCHAIN" --profile minimal
          cargo install cargo-fuzz --version "$KFIND_CARGO_FUZZ_VERSION" --locked
      - name: Run fuzz targets
        run: scripts/run-fuzz.sh
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
          if-no-files-found: ignore

  msrv:
    name: Rust 1.97
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install minimum Rust
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain 1.97.0
      - name: Check all targets
        run: |
          cargo +1.97.0 check --workspace --all-targets --locked
          cargo +1.97.0 check --manifest-path tools/nikl-lexicon/classifier/Cargo.toml \
            --all-targets --locked
          cargo +1.97.0 check --manifest-path tools/morph-compare/runner/Cargo.toml \
            --all-targets --locked
          cargo +1.97.0 check --manifest-path tools/morph-index-benchmark/Cargo.toml \
            --all-targets --locked
      - name: Check WASM library
        run: cargo +1.97.0 check --package kfind-wasm --target wasm32-unknown-unknown --locked

  npm-package:
    name: npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain stable
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build and validate the package
        run: pnpm --dir packages/kfind run pack:check

  site-quality:
    name: Site ${{ matrix.check.name }}
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: format
            script: format:check
          - name: lint
            script: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir site install --frozen-lockfile
      - name: Run ${{ matrix.check.name }} check
        run: pnpm --dir site run ${{ matrix.check.script }}

  site:
    name: Documentation site
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain stable
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir site install --frozen-lockfile
      - name: Type-check and build the site
        run: |
          pnpm --dir site run types:check
          pnpm --dir site run build

  morphology-smoke:
    name: Morphology smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run deterministic smoke benchmark
        run: KFIND_MORPH_SMOKE=1 KFIND_MORPH_RUNS=1 scripts/benchmark-morphology.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: |
          cargo +stable fmt --all -- --check
          cargo +stable fmt --manifest-path fuzz/Cargo.toml -- --check
          cargo +stable fmt --manifest-path tools/morph-index-benchmark/Cargo.toml -- --check
      - name: Run Clippy
        run: |
          cargo +stable clippy --workspace --all-targets --locked -- -D warnings
          cargo +stable clippy --manifest-path tools/morph-index-benchmark/Cargo.toml \
            --all-targets --locked -- -D warnings
      - name: Check fuzz targets
        run: cargo +stable check --manifest-path fuzz/Cargo.toml --bins --locked

  test:
    name: Test (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Run workspace tests
        run: |
          cargo +stable test --workspace --locked
          cargo +stable test --manifest-path tools/morph-index-benchmark/Cargo.toml --locked

  msrv:
    name: Rust 1.85
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install minimum Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain 1.85.0
      - name: Check all targets
        run: |
          cargo +1.85.0 check --workspace --all-targets --locked
          cargo +1.85.0 check --manifest-path tools/morph-index-benchmark/Cargo.toml \
            --all-targets --locked
      - name: Check WASM library
        run: cargo +1.85.0 check --package kfind-wasm --target wasm32-unknown-unknown --locked

  npm-package:
    name: npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain stable
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build and validate the package
        run: pnpm --dir packages/kfind run pack:check

  site-quality:
    name: Site ${{ matrix.check.name }}
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: format
            script: format:check
          - name: lint
            script: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir site install --frozen-lockfile
      - name: Run ${{ matrix.check.name }} check
        run: pnpm --dir site run ${{ matrix.check.script }}

  site:
    name: Documentation site
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain stable
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir site install --frozen-lockfile
      - name: Type-check and build the site
        run: |
          pnpm --dir site run types:check
          pnpm --dir site run build

  morphology-smoke:
    name: Morphology smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run deterministic smoke benchmark
        run: KFIND_MORPH_SMOKE=1 KFIND_MORPH_RUNS=1 scripts/benchmark-morphology.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Check formatting
        run: cargo +stable fmt --all -- --check
      - name: Run Clippy
        run: cargo +stable clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - macos-15
          - macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Run workspace tests
        run: cargo +stable test --workspace --locked

  msrv:
    name: Rust 1.85
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install minimum Rust
        run: rustup toolchain install 1.85.0 --profile minimal
      - name: Check all targets
        run: cargo +1.85.0 check --workspace --all-targets --locked

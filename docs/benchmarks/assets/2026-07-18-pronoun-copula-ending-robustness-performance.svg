<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="850" viewBox="0 0 1280 850" role="img" aria-labelledby="title desc">
<title id="title">Robust workload performance</title>
<desc id="desc">Four panels compare throughput, initialization, p95 latency, and peak RSS for kfind Agent and four external analyzers on the same noisy fixture.</desc>

<style>
  .background { fill: #ffffff; }
  text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .muted { fill: #4b5563; }
  .grid { stroke: #d1d5db; stroke-width: 1; }
  .axis { stroke: #6b7280; stroke-width: 1; }
  @media (prefers-color-scheme: dark) {
    .background { fill: #0d1117; }
    text { fill: #f3f4f6; }
    .muted { fill: #9ca3af; }
    .grid { stroke: #374151; }
    .axis { stroke: #9ca3af; }
  }
</style>

<rect class="background" width="1280" height="850"/>
<text x="52.0" y="38.0" text-anchor="start">Robust workload performance</text>
<text x="52.0" y="62.0" text-anchor="start" class="muted">Same 500 natural noisy cases · one warm-up + five fresh-process measurements</text>
<text x="52.0" y="82.0" text-anchor="start" class="muted">Quality and execution cost are reported separately; lower is better except throughput</text>
<text x="52.0" y="130.0" text-anchor="start">Throughput</text>
<text x="600.0" y="130.0" text-anchor="end" class="muted">higher is better</text>
<text x="52.0" y="178.0" text-anchor="start">kfind Agent</text>
<rect x="164.0" y="161.0" width="254.6" height="25.0" rx="3" fill="#2563eb"/>
<text x="449.0" y="179.0" text-anchor="start">49381.3 cases/s</text>
<text x="52.0" y="221.0" text-anchor="start">Kiwi</text>
<rect x="164.0" y="204.0" width="8.8" height="25.0" rx="3" fill="#059669"/>
<text x="449.0" y="222.0" text-anchor="start">1713.4 cases/s</text>
<text x="52.0" y="264.0" text-anchor="start">Lindera</text>
<rect x="164.0" y="247.0" width="128.7" height="25.0" rx="3" fill="#d97706"/>
<text x="449.0" y="265.0" text-anchor="start">24956.2 cases/s</text>
<text x="52.0" y="307.0" text-anchor="start">MeCab-ko</text>

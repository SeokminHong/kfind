<text x="449.0" y="308.0" text-anchor="start">11454.7 cases/s</text>
<text x="52.0" y="350.0" text-anchor="start">KOMORAN</text>
<rect x="164.0" y="333.0" width="6.9" height="25.0" rx="3" fill="#0891b2"/>
<text x="449.0" y="351.0" text-anchor="start">1329.2 cases/s</text>
<text x="680.0" y="130.0" text-anchor="start">Initialization</text>
<text x="1228.0" y="130.0" text-anchor="end" class="muted">lower is better</text>
<text x="680.0" y="178.0" text-anchor="start">kfind Agent</text>
<rect x="792.0" y="161.0" width="0.3" height="25.0" rx="3" fill="#2563eb"/>
<text x="1077.0" y="179.0" text-anchor="start">0.0021 s</text>
<text x="680.0" y="221.0" text-anchor="start">Kiwi</text>
<rect x="792.0" y="204.0" width="254.6" height="25.0" rx="3" fill="#059669"/>

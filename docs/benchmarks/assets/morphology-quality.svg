<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
<title id="title">Held-out morphology quality</title>
<desc id="desc">Grouped bars compare accuracy, precision, recall, and F1 for kfind, Kiwi, and Lindera.</desc>

<style>
  .background { fill: #ffffff; }
  text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .muted { fill: #4b5563; }
  .grid { stroke: #d1d5db; stroke-width: 1; }
  .axis { stroke: #6b7280; stroke-width: 1; }
  @media (prefers-color-scheme: dark) {
    .background { fill: #0d1117; }
    text { fill: #f3f4f6; }
    .muted { fill: #9ca3af; }
    .grid { stroke: #374151; }
    .axis { stroke: #9ca3af; }
  }
</style>

<rect class="background" width="1120" height="600"/>
<text x="80.0" y="38.0" text-anchor="start">Held-out morphology quality</text>
<text x="80.0" y="62.0" text-anchor="start" class="muted">1,000 balanced lemma/POS presence cases · percent</text>
<line class="grid" x1="80" y1="524.0" x2="1088" y2="524.0"/>
<text x="70.0" y="529.0" text-anchor="end" class="muted">0</text>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680" role="img" aria-labelledby="title desc">
<title id="title">kfind quality by lexicon profile and boundary</title>
<desc id="desc">Grouped bars compare precision, recall, and F1 across embedded and full-POS profiles using smart, token, and any boundaries.</desc>

<style>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
<title id="title">End-to-end morphology performance</title>
<desc id="desc">Four horizontal bar panels compare throughput, initialization time, p95 latency, and peak RSS.</desc>

<style>
  .background { fill: #ffffff; }
  text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .muted { fill: #4b5563; }
  .grid { stroke: #d1d5db; stroke-width: 1; }
  .axis { stroke: #6b7280; stroke-width: 1; }
  @media (prefers-color-scheme: dark) {
    .background { fill: #0d1117; }
    text { fill: #f3f4f6; }
    .muted { fill: #9ca3af; }
    .grid { stroke: #374151; }
    .axis { stroke: #9ca3af; }
  }
</style>

<rect class="background" width="1280" height="720"/>
<text x="52.0" y="38.0" text-anchor="start">End-to-end performance and memory</text>
<text x="52.0" y="62.0" text-anchor="start" class="muted">Single initialization · 1,000 cases · lower is better except throughput</text>
<text x="52.0" y="96.0" text-anchor="start">Throughput</text>
<text x="600.0" y="96.0" text-anchor="end" class="muted">higher is better</text>
<text x="52.0" y="148.0" text-anchor="start">kfind-embedded</text>
<rect x="202.0" y="131.0" width="230.4" height="25.0" rx="3" fill="#2563eb"/>
<text x="468.0" y="149.0" text-anchor="start">22183.8 cases/s</text>
<text x="52.0" y="208.0" text-anchor="start">kfind-full-pos</text>
<rect x="202.0" y="191.0" width="170.6" height="25.0" rx="3" fill="#7c3aed"/>
<text x="468.0" y="209.0" text-anchor="start">16431.3 cases/s</text>
<line class="axis" x1="202" y1="244" x2="460" y2="244"/>
<text x="680.0" y="96.0" text-anchor="start">Initialization</text>
<text x="1228.0" y="96.0" text-anchor="end" class="muted">lower is better</text>
<text x="680.0" y="148.0" text-anchor="start">kfind-embedded</text>
<rect x="830.0" y="131.0" width="141.8" height="25.0" rx="3" fill="#2563eb"/>
<text x="1096.0" y="149.0" text-anchor="start">0.2334 s</text>
<text x="680.0" y="208.0" text-anchor="start">kfind-full-pos</text>
<rect x="830.0" y="191.0" width="230.4" height="25.0" rx="3" fill="#7c3aed"/>
<text x="1096.0" y="209.0" text-anchor="start">0.3791 s</text>
<line class="axis" x1="830" y1="244" x2="1088" y2="244"/>
<text x="52.0" y="390.0" text-anchor="start">p95 latency</text>
<text x="600.0" y="390.0" text-anchor="end" class="muted">lower is better</text>
<text x="52.0" y="442.0" text-anchor="start">kfind-embedded</text>
<rect x="202.0" y="425.0" width="133.3" height="25.0" rx="3" fill="#2563eb"/>
<text x="468.0" y="443.0" text-anchor="start">0.0673 ms</text>
<text x="52.0" y="502.0" text-anchor="start">kfind-full-pos</text>
<rect x="202.0" y="485.0" width="230.4" height="25.0" rx="3" fill="#7c3aed"/>
<text x="468.0" y="503.0" text-anchor="start">0.1163 ms</text>
<line class="axis" x1="202" y1="538" x2="460" y2="538"/>
<text x="680.0" y="390.0" text-anchor="start">Peak RSS</text>
<text x="1228.0" y="390.0" text-anchor="end" class="muted">lower is better</text>
<text x="680.0" y="442.0" text-anchor="start">kfind-embedded</text>
<rect x="830.0" y="425.0" width="114.3" height="25.0" rx="3" fill="#2563eb"/>
<text x="1096.0" y="443.0" text-anchor="start">40.7 MiB</text>
<text x="680.0" y="502.0" text-anchor="start">kfind-full-pos</text>
<rect x="830.0" y="485.0" width="230.4" height="25.0" rx="3" fill="#7c3aed"/>
<text x="1096.0" y="503.0" text-anchor="start">82.0 MiB</text>
<line class="axis" x1="830" y1="538" x2="1088" y2="538"/>
</svg>

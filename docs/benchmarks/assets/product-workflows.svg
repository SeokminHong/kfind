<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="660" viewBox="0 0 1280 660" role="img" aria-labelledby="title desc">
<title id="title">Product workflow benchmark</title>
<desc id="desc">Quality, throughput, and initialization compare the agent embedded-any workflow with the human full-POS-smart workflow.</desc>

<style>
  .background { fill: #ffffff; }
  text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .muted { fill: #4b5563; }
  .grid { stroke: #d1d5db; stroke-width: 1; }
  .axis { stroke: #6b7280; stroke-width: 1; }
  @media (prefers-color-scheme: dark) {
    .background { fill: #0d1117; }
    text { fill: #f3f4f6; }
    .muted { fill: #9ca3af; }
    .grid { stroke: #374151; }
    .axis { stroke: #9ca3af; }
  }
</style>

<rect class="background" width="1280" height="660"/>
<text x="52.0" y="38.0" text-anchor="start">Product workflow benchmark</text>
<text x="52.0" y="62.0" text-anchor="start" class="muted">Agent: embedded · any · explicit POS  |  Human: full-POS · smart · untagged</text>
<text x="52.0" y="84.0" text-anchor="start">Quality and query usability · percent</text>
<line class="grid" x1="242.0" y1="104" x2="242.0" y2="362"/>
<text x="242.0" y="390.0" text-anchor="middle" class="muted">0</text>

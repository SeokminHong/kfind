<text x="422.0" y="390.0" text-anchor="middle" class="muted">50</text>
<line class="grid" x1="512.0" y1="104" x2="512.0" y2="362"/>
<text x="512.0" y="390.0" text-anchor="middle" class="muted">75</text>
<line class="grid" x1="602.0" y1="104" x2="602.0" y2="362"/>
<text x="602.0" y="390.0" text-anchor="middle" class="muted">100</text>
<text x="52.0" y="136.0" text-anchor="start">Agent · recall</text>
<rect x="242.0" y="119.0" width="344.9" height="25.0" rx="3" fill="#2563eb"/>
<text x="614.0" y="137.0" text-anchor="start">95.80%</text>
<text x="52.0" y="200.0" text-anchor="start">Human · precision</text>
<rect x="242.0" y="183.0" width="359.1" height="25.0" rx="3" fill="#7c3aed"/>
<text x="614.0" y="201.0" text-anchor="start">99.76%</text>
<text x="52.0" y="264.0" text-anchor="start">Human · recall</text>
<rect x="242.0" y="247.0" width="295.2" height="25.0" rx="3" fill="#7c3aed"/>
<text x="614.0" y="265.0" text-anchor="start">82.00%</text>
<text x="52.0" y="328.0" text-anchor="start">Human · POS plan</text>
<rect x="242.0" y="311.0" width="347.0" height="25.0" rx="3" fill="#7c3aed"/>
<text x="614.0" y="329.0" text-anchor="start">96.40%</text>
<text x="700.0" y="84.0" text-anchor="start">Throughput · cases/s</text>
<text x="700.0" y="136.0" text-anchor="start">Agent</text>
<rect x="800.0" y="119.0" width="324.1" height="25.0" rx="3" fill="#2563eb"/>
<text x="1162.0" y="137.0" text-anchor="start">15,790.0</text>
<text x="700.0" y="200.0" text-anchor="start">Human</text>
<rect x="800.0" y="183.0" width="164.9" height="25.0" rx="3" fill="#7c3aed"/>
<text x="1162.0" y="201.0" text-anchor="start">8,036.3</text>
<text x="700.0" y="312.0" text-anchor="start">Initialization · ms</text>
<text x="700.0" y="364.0" text-anchor="start">Agent</text>
<rect x="800.0" y="347.0" width="0.8" height="25.0" rx="3" fill="#2563eb"/>
<text x="1162.0" y="365.0" text-anchor="start">1.09</text>
<text x="700.0" y="428.0" text-anchor="start">Human</text>

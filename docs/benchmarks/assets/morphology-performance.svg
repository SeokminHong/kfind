<text x="680.0" y="208.0" text-anchor="start">kiwi</text>
<rect x="748.0" y="191.0" width="303.6" height="25.0" rx="3" fill="#059669"/>
<text x="1096.0" y="209.0" text-anchor="start">1.6743 s</text>
<text x="680.0" y="268.0" text-anchor="start">lindera</text>

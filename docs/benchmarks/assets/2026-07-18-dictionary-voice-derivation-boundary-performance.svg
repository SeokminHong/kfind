<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
<title id="title">kfind performance by lexicon profile and boundary</title>
<desc id="desc">Four horizontal bar panels compare throughput, initialization time, p95 latency, and peak RSS across six kfind configurations.</desc>

<style>
  .background { fill: #ffffff; }

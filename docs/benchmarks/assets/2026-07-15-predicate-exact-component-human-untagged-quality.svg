<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
<title id="title">Human untagged search quality</title>
<desc id="desc">Grouped bars compare precision, recall, and F1 for untagged queries across two lexicon profiles and two boundary policies.</desc>

<style>
  .background { fill: #ffffff; }
  text { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .muted { fill: #4b5563; }
  .grid { stroke: #d1d5db; stroke-width: 1; }
  .axis { stroke: #6b7280; stroke-width: 1; }
  @media (prefers-color-scheme: dark) {
    .background { fill: #0d1117; }
    text { fill: #f3f4f6; }
    .muted { fill: #9ca3af; }
    .grid { stroke: #374151; }
    .axis { stroke: #9ca3af; }
  }
</style>

<rect class="background" width="1120" height="620"/>
<text x="80.0" y="38.0" text-anchor="start">Human untagged search quality</text>
<text x="80.0" y="62.0" text-anchor="start" class="muted">1,000 balanced lemma-presence cases · no POS option or atom tag</text>
